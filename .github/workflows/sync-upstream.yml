name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: gh repo sync ${{ github.repository }} --source nexu-io/open-design
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
